<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard - SETI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">SETI Admin</a>
      </div>
    </nav>

    <div class="container mt-4">
      <div class="row g-3">
        <div class="col-md-3">
          <div class="card p-3">
            <h6>Total Customers</h6>
            <h3 id="kpi-customers">--</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card p-3">
            <h6>Sales Today</h6>
            <h3 id="kpi-sales">--</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card p-3">
            <h6>Pending Commissions</h6>
            <h3 id="kpi-commissions">--</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card p-3">
            <h6>Inventory Value</h6>
            <h3 id="kpi-inventory">--</h3>
          </div>
        </div>
      </div>

      <div class="row mt-4">
        <div class="col-md-8">
          <div class="card p-3">
            <canvas id="salesChart" height="150"></canvas>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card p-3">
            <h6>Quick Actions</h6>
            <button class="btn btn-primary mb-2">Add Product</button>
            <button class="btn btn-secondary mb-2">New Customer</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/admin.js"></script>
  </body>
</html>
